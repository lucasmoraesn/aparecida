server {
    listen 80;
    server_name aparecidadonortesp.com.br www.aparecidadonortesp.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aparecidadonortesp.com.br www.aparecidadonortesp.com.br;

    ssl_certificate /etc/letsencrypt/live/aparecidadonortesp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aparecidadonortesp.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html;

    # ============================================
    # PERFORMANCE: Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/rss+xml application/atom+xml image/svg+xml;

    # ============================================
    # PERFORMANCE: Browser Cache for Static Assets
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # Scanner blocker (return 444 = close connection)
    # ============================================
    location ^~ /.env { return 444; }
    location ^~ /.git { return 444; }
    location ^~ /vendor/ { return 444; }
    location = /vendor { return 444; }
    location ^~ /admin/ { return 444; }
    location = /admin { return 444; }
    location ^~ /phpmyadmin { return 444; }
    location ~ \.(env|php|asp|jsp|config|key|sql)$ { return 444; }

    # ============================================
    # SPA Routing
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # API Proxy
    # ============================================
    location ~ ^/(health|ready)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
